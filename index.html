<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MNPS Project Triage</title>
</head>
<body>
  <h1>MNPS Project Triage</h1>

  <form id="triage-form" action="#" method="post">
    <p>
      <label for="project-name">Project Name</label><br>
      <input type="text" id="project-name" name="project_name" required>
    </p>

    <p>
      <label for="department">Department</label><br>
      <input type="text" id="department" name="department" required>
    </p>

    <p>
      <label for="requested-outcome">Requested Outcome</label><br>
      <textarea id="requested-outcome" name="requested_outcome" rows="5" cols="50" required></textarea>
    </p>

    <p>
      <label for="urgency">Urgency</label><br>
      <select id="urgency" name="urgency" required>
        <option value="">Select urgency</option>
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
        <option value="critical">Critical</option>
      </select>
    </p>

    <p>
      <label for="users-impacted">Users Impacted</label><br>
      <select id="users-impacted" name="users_impacted" required>
        <option value="">Select range</option>
        <option value="1-10">1-10</option>
        <option value="11-50">11-50</option>
        <option value="51-200">51-200</option>
        <option value="200+">200+</option>
      </select>
    </p>

    <p>
      <label for="compliance-required">Compliance Required</label><br>
      <select id="compliance-required" name="compliance_required" required>
        <option value="">Select option</option>
        <option value="no">No</option>
        <option value="yes">Yes</option>
      </select>
    </p>

    <p>
      <label for="estimated-complexity">Estimated Complexity</label><br>
      <select id="estimated-complexity" name="estimated_complexity" required>
        <option value="">Select complexity</option>
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>
    </p>

    <p>
      <label for="strategic-alignment">Strategic Alignment</label><br>
      <select id="strategic-alignment" name="strategic_alignment" required>
        <option value="">Select alignment</option>
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>
    </p>

    <p>
      <button type="submit">Calculate Score</button>
    </p>
  </form>

  <section id="result" aria-live="polite">
    <h2>Triage Result</h2>
    <p>Total Score: <span id="total-score">0</span></p>
    <p>Priority Level: <span id="priority-level">Not calculated yet</span></p>
  </section>

  <script>
    // Find the form on the page so we can listen for submit events.
    var triageForm = document.getElementById('triage-form');
    var totalScoreElement = document.getElementById('total-score');
    var priorityLevelElement = document.getElementById('priority-level');

    // Run this function every time the form is submitted.
    triageForm.addEventListener('submit', function (event) {
      // Stop the browser's default behavior (page refresh).
      event.preventDefault();

      // Collect all form values in one object so we can score each answer.
      var formData = new FormData(triageForm);

      // Read each field from the form.
      var urgency = formData.get('urgency');
      var usersImpacted = formData.get('users_impacted');
      var complianceRequired = formData.get('compliance_required');
      var estimatedComplexity = formData.get('estimated_complexity');
      var strategicAlignment = formData.get('strategic_alignment');

      // Scoring tables:
      // Each answer maps directly to the points in the project triage rules.
      var urgencyScores = { low: 5, medium: 10, high: 15, critical: 20 };
      var usersImpactedScores = { '1-10': 5, '11-50': 10, '51-200': 15, '200+': 20 };
      var complianceScores = { no: 0, yes: 25 };
      var complexityScores = { low: 15, medium: 10, high: 5 };
      var alignmentScores = { low: 5, medium: 10, high: 20 };

      // Add up the points from each section to get a total score.
      var totalScore =
        urgencyScores[urgency] +
        usersImpactedScores[usersImpacted] +
        complianceScores[complianceRequired] +
        complexityScores[estimatedComplexity] +
        alignmentScores[strategicAlignment];

      // Convert the score to a priority label.
      // 0-39 => Low Priority, 40-69 => Review Needed, 70-100 => High Priority
      var priorityLevel = '';
      if (totalScore <= 39) {
        priorityLevel = 'Low Priority';
      } else if (totalScore <= 69) {
        priorityLevel = 'Review Needed';
      } else {
        priorityLevel = 'High Priority';
      }

      // Display the result below the form.
      totalScoreElement.textContent = totalScore;
      priorityLevelElement.textContent = priorityLevel;
    });
  </script>
</body>
</html>
